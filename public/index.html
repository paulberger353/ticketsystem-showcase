<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticketsystem – Anmelden</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-card">

    <!-- Logo & Title -->
    <div class="login-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <line x1="10" y1="9"  x2="8" y2="9"/>
      </svg>
    </div>
    <h1 class="login-title">Ticketsystem</h1>
    <p class="login-subtitle">Entwicklungs-Fortschritt auf einen Blick</p>

    <!-- Admin account -->
    <p class="login-section-label">Administrator</p>
    <button class="account-btn is-admin" onclick="openAdminModal()">
      <span class="account-icon">🛡️</span>
      <div class="account-info">
        <span class="account-name">Admin</span>
        <span class="account-role">Globale Übersicht · Alle Tickets &amp; Aktionen</span>
      </div>
      <span class="account-chevron">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </span>
    </button>

    <!-- Divider -->
    <div class="login-divider">
      <span class="login-divider-line"></span>
      <span class="login-section-label">Kundenkonten</span>
      <span class="login-divider-line"></span>
    </div>

    <!-- Client accounts -->
    <button class="account-btn" onclick="login('karl')">
      <span class="account-icon">🔧</span>
      <div class="account-info">
        <span class="account-name">Karl KFZ</span>
        <span class="account-role">Desktop-Werkstattplaner v2</span>
      </div>
      <span class="account-chevron">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </span>
    </button>

    <button class="account-btn" onclick="login('bob')">
      <span class="account-icon">🏗️</span>
      <div class="account-info">
        <span class="account-name">Bob Baumeister</span>
        <span class="account-role">Bau-Projektplaner WebApp</span>
      </div>
      <span class="account-chevron">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </span>
    </button>

    <button class="account-btn" onclick="login('beate')">
      <span class="account-icon">🥐</span>
      <div class="account-info">
        <span class="account-name">Beate Bäcker</span>
        <span class="account-role">Web-Bestellsystem &amp; App</span>
      </div>
      <span class="account-chevron">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </span>
    </button>

    <div id="loginError" style="display:none;margin-top:14px" class="error-banner"></div>

    <!-- Footer -->
    <div class="login-footer">
      <span>Ticketsystem Demo</span>
    </div>
  </div>

  <!-- Admin Password Modal -->
  <div id="adminModal" class="modal-overlay" onclick="closeAdminModal(event)">
    <div class="modal-card">
      <div class="modal-handle"></div>
      <div class="modal-icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="modal-title">Admin-Anmeldung</div>
      <div class="modal-subtitle">Bitte geben Sie das Administrator-Passwort ein, um fortzufahren.</div>
      <label class="modal-label" for="adminPassword">Passwort</label>
      <div class="modal-input-wrap">
        <input type="password" id="adminPassword" placeholder="••••••••"
               onkeydown="handlePasswordKey(event)" autocomplete="current-password">
      </div>
      <div id="adminPwError" class="modal-error" style="display:none">
        Falsches Passwort – bitte erneut versuchen.
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeAdminModal()">Abbrechen</button>
        <button class="btn-confirm" onclick="submitAdminPassword()">Anmelden</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      try {
        const u = JSON.parse(localStorage.getItem('ts_user'));
        if (u) location.href = u.role === 'admin' ? 'admin.html' : 'client.html';
      } catch {}
    })();

    function openAdminModal() {
      const modal = document.getElementById('adminModal');
      const input = document.getElementById('adminPassword');
      const err   = document.getElementById('adminPwError');
      input.value = '';
      err.style.display = 'none';
      modal.classList.add('open');
      setTimeout(() => input.focus(), 50);
    }

    function closeAdminModal(e) {
      if (e && e.target !== document.getElementById('adminModal')) return;
      document.getElementById('adminModal').classList.remove('open');
    }

    function handlePasswordKey(e) {
      if (e.key === 'Enter')  submitAdminPassword();
      if (e.key === 'Escape') document.getElementById('adminModal').classList.remove('open');
    }

    function submitAdminPassword() {
      const input = document.getElementById('adminPassword');
      const err   = document.getElementById('adminPwError');
      if (input.value === 'admin') {
        document.getElementById('adminModal').classList.remove('open');
        login('admin');
      } else {
        err.style.display = 'block';
        input.classList.remove('shake');
        void input.offsetWidth;
        input.classList.add('shake');
        input.value = '';
        input.focus();
      }
    }

    async function login(username) {
      const allBtns = document.querySelectorAll('.account-btn');
      allBtns.forEach(b => (b.disabled = true));
      const errBox = document.getElementById('loginError');
      errBox.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login fehlgeschlagen');
        localStorage.setItem('ts_user', JSON.stringify(data.user));
        location.href = data.user.role === 'admin' ? 'admin.html' : 'client.html';
      } catch (err) {
        errBox.textContent = 'Fehler: ' + err.message;
        errBox.style.display = 'block';
        allBtns.forEach(b => (b.disabled = false));
      }
    }
  </script>
</body>
</html>
