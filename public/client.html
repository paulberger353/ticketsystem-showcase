<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticketsystem – Meine Tickets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="topbar">
    <a class="topbar-logo" href="#">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      Ticketsystem
    </a>
    <span class="topbar-spacer"></span>
    <div class="topbar-user">
      <span class="topbar-user-name" id="userDisplay"></span>
      <span class="badge badge-client">Kunde</span>
    </div>
    <button class="btn-logout" onclick="logout()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="btn-logout-label">Abmelden</span>
    </button>
  </nav>

  <main class="page-wrapper">
    <div class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">Meine Tickets</h1>
        <p class="page-subtitle">Ihr Entwicklungs-Fortschritt im Überblick</p>
      </div>
    </div>
    <div id="ticketList">
      <div class="loading-state">
        <div class="spinner"></div>
        Tickets werden geladen …
      </div>
    </div>
  </main>

  <div id="toast"></div>
  <script src="app.js"></script>
  <script>
    const currentUser = requireAuth('client');
    if (currentUser) {
      document.getElementById('userDisplay').textContent = currentUser.display_name;
      loadTickets();
    }

    async function loadTickets() {
      const container = document.getElementById('ticketList');
      try {
        const { tickets } = await api('/tickets');
        if (!tickets.length) {
          container.innerHTML = '<div class="empty-state"><p>Keine Tickets vorhanden.</p></div>';
          return;
        }
        container.innerHTML = tickets.map(renderTicketCard).join('');
      } catch (err) {
        container.innerHTML = `<div class="error-banner">Laden fehlgeschlagen: ${esc(err.message)}</div>`;
      }
    }

    function renderTicketCard(t) {
      return `
        <div class="ticket-card" id="ticket-${t.id}" data-status="${esc(t.status)}">
          <div class="ticket-header">
            <div class="ticket-title-row">
              <div class="ticket-title">${esc(t.title)}</div>
              <div class="ticket-meta">
                ${statusBadge(t.status)}
                ${t.platform ? `<span class="meta-tag">${ICON.screen}&nbsp;${esc(t.platform)}</span>` : ''}
              </div>
            </div>
          </div>
          ${t.description ? `<div class="ticket-body">${esc(t.description)}</div>` : ''}
          <div class="comments-section">
            <button class="comments-toggle" onclick="toggleComments(this, ${t.id})">
              ${ICON.chat}&nbsp;Kommentare
              <span class="caret">${ICON.chevron}</span>
            </button>
            <div class="comments-body" id="comments-${t.id}"></div>
          </div>
        </div>`;
    }

    async function toggleComments(btn, ticketId) {
      const body = document.getElementById(`comments-${ticketId}`);
      const open = body.classList.contains('open');
      if (open) { body.classList.remove('open'); btn.classList.remove('open'); return; }
      btn.classList.add('open');
      body.classList.add('open');
      if (body.dataset.loaded) return;
      body.innerHTML = `<div class="loading-state" style="padding:16px 0">
        <div class="spinner" style="width:20px;height:20px;border-width:2px"></div></div>`;
      try {
        const { comments } = await api(`/tickets/${ticketId}`);
        body.dataset.loaded = '1';
        renderCommentBody(body, comments, ticketId);
      } catch (err) {
        body.innerHTML = `<div class="error-banner" style="margin:8px 0">${esc(err.message)}</div>`;
      }
    }

    function renderCommentBody(body, comments, ticketId) {
      const listHTML = comments.length
        ? comments.map(c => `
            <div class="comment-item" id="c${c.id}">
              <div class="comment-avatar" data-idx="${avatarIdx(c.username)}">${avatar(c.username)}</div>
              <div class="comment-content">
                <div class="comment-header">
                  <span class="comment-author">${esc(c.username)}</span>
                  <span class="comment-date">${fmtDate(c.created_at)}</span>
                </div>
                <div class="comment-text">${esc(c.text)}</div>
              </div>
            </div>`).join('')
        : '<p class="no-comments">Noch keine Kommentare – schreiben Sie den ersten!</p>';

      body.innerHTML = listHTML + `
        <form class="comment-form" onsubmit="submitComment(event, ${ticketId})">
          <textarea placeholder="Kommentar schreiben …" rows="3" required></textarea>
          <div class="comment-form-actions">
            <button type="submit" class="btn btn-primary btn-sm">Absenden</button>
          </div>
        </form>`;
    }

    async function submitComment(e, ticketId) {
      e.preventDefault();
      const form      = e.currentTarget;
      const textarea  = form.querySelector('textarea');
      const text      = textarea.value.trim();
      if (!text) return;
      const submitBtn = form.querySelector('button[type=submit]');
      submitBtn.disabled    = true;
      submitBtn.textContent = '…';
      try {
        await api(`/tickets/${ticketId}/comments`, {
          method: 'POST',
          body:   JSON.stringify({ text }),
        });
        textarea.value = '';
        showToast('Kommentar gespeichert');
        const body = document.getElementById(`comments-${ticketId}`);
        delete body.dataset.loaded;
        const { comments } = await api(`/tickets/${ticketId}`);
        body.dataset.loaded = '1';
        renderCommentBody(body, comments, ticketId);
      } catch (err) {
        showToast('Fehler: ' + err.message, 'error');
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Absenden';
      }
    }
  </script>
</body>
</html>
