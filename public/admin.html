<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticketsystem – Admin-Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Topbar -->
  <nav class="topbar">
    <a class="topbar-logo" href="#">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      Ticketsystem
    </a>
    <span class="topbar-spacer"></span>
    <div class="topbar-user">
      <span id="userDisplay"></span>
      <span class="badge badge-admin">Administrator</span>
    </div>
    <button class="btn-logout" onclick="logout()">Abmelden</button>
  </nav>

  <!-- Main Content -->
  <main class="page-wrapper">
    <div class="page-header">
      <h1 class="page-title">Admin-Dashboard</h1>
      <p class="page-subtitle">Globale Übersicht · Alle Tickets und Kommentare verwalten</p>
    </div>

    <!-- Statistiken -->
    <div id="statsBar" class="stats-bar"></div>

    <!-- Ticket-Liste -->
    <div id="ticketList">
      <div class="loading-state">
        <div class="spinner"></div>
        Daten werden geladen …
      </div>
    </div>
  </main>

  <div id="toast"></div>
  <script src="app.js"></script>
  <script>
    /* ── Init ─────────────────────────────────────────────────────────────── */
    const currentUser = requireAuth('admin');
    if (currentUser) {
      document.getElementById('userDisplay').textContent = currentUser.display_name;
      loadDashboard();
    }

    /* ── Dashboard laden ──────────────────────────────────────────────────── */
    async function loadDashboard() {
      const listEl  = document.getElementById('ticketList');
      const statsEl = document.getElementById('statsBar');
      try {
        const { tickets } = await api('/tickets');
        renderStats(statsEl, tickets);
        renderTickets(listEl, tickets);
      } catch (err) {
        listEl.innerHTML = `<div class="error-banner">Laden fehlgeschlagen: ${esc(err.message)}</div>`;
      }
    }

    /* ── Statistiken rendern ──────────────────────────────────────────────── */
    function renderStats(el, tickets) {
      const STATUS_ORDER = [
        'Konzept', 'Entwicklung', 'Testen', 'Optimieren',
        'Bereit zu Abnahme', 'Abgenommen durch Kunden',
      ];
      const counts = {};
      STATUS_ORDER.forEach(s => (counts[s] = 0));
      tickets.forEach(t => { counts[t.status] = (counts[t.status] || 0) + 1; });
      const active = tickets.filter(t => t.status !== 'Abgenommen durch Kunden').length;

      const statusCards = STATUS_ORDER
        .filter(s => counts[s] > 0)
        .map(s => `
          <div class="stat-card">
            <div class="stat-value">${counts[s]}</div>
            <div class="stat-label" style="display:flex;align-items:center;gap:5px;margin-top:6px">
              ${statusBadge(s)}
            </div>
          </div>`)
        .join('');

      el.innerHTML = `
        <div class="stat-card">
          <div class="stat-value">${tickets.length}</div>
          <div class="stat-label">Tickets gesamt</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${active}</div>
          <div class="stat-label">In Bearbeitung</div>
        </div>
        ${statusCards}`;
    }

    /* ── Ticket-Liste rendern ─────────────────────────────────────────────── */
    function renderTickets(el, tickets) {
      if (!tickets.length) {
        el.innerHTML = '<div class="empty-state"><p>Keine Tickets vorhanden.</p></div>';
        return;
      }
      el.innerHTML = tickets.map(renderTicketCard).join('');
    }

    /* ── Ticket-Karte rendern ─────────────────────────────────────────────── */
    function renderTicketCard(t) {
      return `
        <div class="ticket-card" id="ticket-${t.id}">
          <div class="ticket-header">
            <div class="ticket-title-row">
              <div class="ticket-title">${esc(t.title)}</div>
              <div class="ticket-meta">
                ${statusBadge(t.status)}
                ${t.platform    ? `<span class="meta-tag">${ICON.screen} ${esc(t.platform)}</span>`    : ''}
                ${t.owner_name  ? `<span class="meta-tag">${ICON.user}   ${esc(t.owner_name)}</span>`  : ''}
              </div>
            </div>
            <div class="ticket-actions">
              <button class="btn btn-danger btn-sm"
                      onclick="deleteTicket(${t.id}, ${JSON.stringify(t.title)})">
                ${ICON.trash} Löschen
              </button>
            </div>
          </div>
          ${t.description
            ? `<div class="ticket-body">${esc(t.description)}</div>`
            : ''}
          <div class="comments-section">
            <button class="comments-toggle" onclick="toggleComments(this, ${t.id})">
              ${ICON.chat}
              Kommentare
              <span class="caret">${ICON.chevron}</span>
            </button>
            <div class="comments-body" id="comments-${t.id}"></div>
          </div>
        </div>`;
    }

    /* ── Kommentare ein-/ausblenden ───────────────────────────────────────── */
    async function toggleComments(btn, ticketId) {
      const body = document.getElementById(`comments-${ticketId}`);
      const open = body.classList.contains('open');

      if (open) {
        body.classList.remove('open');
        btn.classList.remove('open');
        return;
      }

      btn.classList.add('open');
      body.classList.add('open');

      if (body.dataset.loaded) return;

      body.innerHTML = `<div class="loading-state" style="padding:18px 0">
        <div class="spinner" style="width:22px;height:22px;border-width:2px"></div></div>`;

      try {
        const { comments } = await api(`/tickets/${ticketId}`);
        body.dataset.loaded = '1';
        renderAdminComments(body, comments, ticketId);
      } catch (err) {
        body.innerHTML = `<div class="error-banner" style="margin:8px 0">${esc(err.message)}</div>`;
      }
    }

    /* ── Admin-Kommentarliste rendern ─────────────────────────────────────── */
    function renderAdminComments(body, comments, ticketId) {
      if (!comments.length) {
        body.innerHTML = '<p class="no-comments">Keine Kommentare vorhanden.</p>';
        return;
      }
      body.innerHTML = comments.map(c => `
        <div class="comment-item" id="c${c.id}">
          <div class="comment-avatar">${avatar(c.username)}</div>
          <div class="comment-content">
            <div class="comment-header">
              <span class="comment-author">${esc(c.username)}</span>
              <span class="comment-date">${fmtDate(c.created_at)}</span>
              <div class="comment-actions">
                <button class="btn btn-danger btn-sm"
                        onclick="deleteComment(${c.id}, ${ticketId})">
                  ${ICON.trash} Löschen
                </button>
              </div>
            </div>
            <div class="comment-text">${esc(c.text)}</div>
          </div>
        </div>`).join('');
    }

    /* ── Ticket löschen ───────────────────────────────────────────────────── */
    async function deleteTicket(ticketId, title) {
      if (!confirm(`Ticket "${title}" und alle zugehörigen Kommentare wirklich löschen?\n\nDiese Aktion kann nicht rückgängig gemacht werden.`)) return;
      try {
        await api(`/tickets/${ticketId}`, { method: 'DELETE' });
        showToast(`Ticket "${title}" gelöscht`);
        await loadDashboard();
      } catch (err) {
        showToast('Fehler: ' + err.message, 'error');
      }
    }

    /* ── Kommentar löschen ────────────────────────────────────────────────── */
    async function deleteComment(commentId, ticketId) {
      if (!confirm('Kommentar wirklich löschen?')) return;
      try {
        await api(`/comments/${commentId}`, { method: 'DELETE' });
        document.getElementById(`c${commentId}`)?.remove();

        /* Leermeldung anzeigen wenn keine Kommentare mehr */
        const body = document.getElementById(`comments-${ticketId}`);
        if (body && !body.querySelector('.comment-item')) {
          body.innerHTML = '<p class="no-comments">Keine Kommentare vorhanden.</p>';
        }
        showToast('Kommentar gelöscht');
      } catch (err) {
        showToast('Fehler: ' + err.message, 'error');
      }
    }
  </script>
</body>
</html>
