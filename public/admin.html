<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticketsystem – Admin-Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="topbar">
    <a class="topbar-logo" href="#">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      Ticketsystem
    </a>
    <span class="topbar-spacer"></span>
    <div class="topbar-user">
      <span class="topbar-user-name" id="userDisplay"></span>
      <span class="badge badge-admin">Admin</span>
    </div>
    <button class="btn-logout" onclick="logout()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="btn-logout-label">Abmelden</span>
    </button>
  </nav>

  <main class="page-wrapper">
    <div class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">Admin-Dashboard</h1>
        <p class="page-subtitle">Globale Übersicht · Alle Tickets und Kommentare verwalten</p>
      </div>
      <div class="page-header-right">
        <div class="view-toggle">
          <button type="button" class="view-toggle-btn active" data-view="list" onclick="setView('list')">Liste</button>
          <button type="button" class="view-toggle-btn" data-view="board" onclick="setView('board')">Board</button>
        </div>
        <button class="btn btn-primary" onclick="openCreateModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Neues Ticket
        </button>
      </div>
    </div>
    <div id="statsBar" class="stats-bar"></div>
    <div id="filterBar" class="filter-bar" style="display:none"></div>
    <div id="ticketList">
      <div class="loading-state">
        <div class="spinner"></div>
        Daten werden geladen …
      </div>
    </div>
    <div id="kanbanBoard" class="kanban-board" style="display:none"></div>
  </main>

  <!-- Create Ticket Modal -->
  <div id="createTicketModal" class="modal-overlay" onclick="if(event.target===this)closeCreateModal()">
    <div class="modal-card">
      <div class="modal-title">Neues Ticket</div>
      <div class="modal-subtitle">Erstellen Sie ein Ticket und weisen Sie es einem Kunden zu.</div>

      <label class="modal-label" for="cTitle">Titel *</label>
      <div class="modal-input-wrap">
        <input type="text" id="cTitle" placeholder="z.B. Startseite Redesign"
               onkeydown="if(event.key==='Enter')submitCreate()">
      </div>

      <div class="modal-row">
        <div>
          <label class="modal-label" for="cUser">Kunde *</label>
          <div class="modal-input-wrap">
            <select id="cUser"></select>
          </div>
        </div>
        <div>
          <label class="modal-label" for="cStatus">Status</label>
          <div class="modal-input-wrap">
            <select id="cStatus">
              <option value="Konzept">Konzept</option>
              <option value="Entwicklung">Entwicklung</option>
              <option value="Testen">Testen</option>
              <option value="Optimieren">Optimieren</option>
              <option value="Bereit zu Abnahme">Bereit zu Abnahme</option>
              <option value="Abgenommen durch Kunden">Abgenommen durch Kunden</option>
            </select>
          </div>
        </div>
      </div>

      <label class="modal-label" for="cPlatform">Plattform</label>
      <div class="modal-input-wrap">
        <input type="text" id="cPlatform" placeholder="z.B. Desktop, Mobile">
      </div>

      <label class="modal-label" for="cDesc">Beschreibung</label>
      <div class="modal-input-wrap">
        <textarea id="cDesc" placeholder="Optionale Beschreibung …" rows="3"></textarea>
      </div>

      <div id="createError" class="modal-error" style="display:none"></div>

      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeCreateModal()">Abbrechen</button>
        <button class="btn-confirm" onclick="submitCreate()">Ticket erstellen</button>
      </div>
    </div>
  </div>

  <!-- Edit Ticket Modal -->
  <div id="editTicketModal" class="modal-overlay" onclick="if(event.target===this)closeEditModal()">
    <div class="modal-card">
      <div class="modal-title">Ticket bearbeiten</div>

      <label class="modal-label" for="eTitle">Titel</label>
      <div class="modal-input-wrap">
        <input type="text" id="eTitle" onkeydown="if(event.key==='Enter')submitEdit()">
      </div>

      <div class="modal-row">
        <div>
          <label class="modal-label" for="eStatus">Status</label>
          <div class="modal-input-wrap">
            <select id="eStatus">
              <option value="Konzept">Konzept</option>
              <option value="Entwicklung">Entwicklung</option>
              <option value="Testen">Testen</option>
              <option value="Optimieren">Optimieren</option>
              <option value="Bereit zu Abnahme">Bereit zu Abnahme</option>
              <option value="Abgenommen durch Kunden">Abgenommen durch Kunden</option>
            </select>
          </div>
        </div>
        <div>
          <label class="modal-label" for="ePlatform">Plattform</label>
          <div class="modal-input-wrap">
            <input type="text" id="ePlatform" placeholder="z.B. Desktop, Mobile">
          </div>
        </div>
      </div>

      <label class="modal-label" for="eDesc">Beschreibung</label>
      <div class="modal-input-wrap">
        <textarea id="eDesc" rows="3" placeholder="Optionale Beschreibung …"></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeEditModal()">Abbrechen</button>
        <button class="btn-confirm" onclick="submitEdit()">Speichern</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="app.js"></script>
  <script src="store.js"></script>
  <script>
    const currentUser = requireAuth('admin');
    let allTickets         = [];
    let clientUsers        = [];
    let activeStatusFilter = '';
    let editingTicketId    = null;
    let currentView        = 'list';

    if (currentUser) {
      document.getElementById('userDisplay').textContent = currentUser.display_name;
      loadDashboard();
    }

    async function loadDashboard() {
      const listEl  = document.getElementById('ticketList');
      const statsEl = document.getElementById('statsBar');
      try {
        await Store.init();
        const tickets = Store.getTickets(currentUser);
        allTickets = tickets;
        clientUsers = Store.getClientUsers();
        renderStats(statsEl, tickets);
        renderFilterBar(tickets);
        if (currentView === 'board') renderKanban(allTickets); else applyFilter();
      } catch (err) {
        listEl.innerHTML = `<div class="error-banner">Laden fehlgeschlagen: ${esc(err.message)}</div>`;
      }
    }

    /* ── List / Board toggle ─────────────────────────────────────────────── */
    function setView(view) {
      currentView = view;
      document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
      const listEl   = document.getElementById('ticketList');
      const boardEl  = document.getElementById('kanbanBoard');
      const filterEl = document.getElementById('filterBar');
      if (view === 'board') {
        listEl.innerHTML = '';
        listEl.style.display = 'none';
        filterEl.style.display = 'none';
        boardEl.style.display = 'grid';
        renderKanban(allTickets);
      } else {
        boardEl.innerHTML = '';
        boardEl.style.display = 'none';
        listEl.style.display = '';
        filterEl.style.display = 'flex';
        applyFilter();
      }
    }

    function renderStats(el, tickets) {
      const counts = {};
      STATUS_ORDER.forEach(s => (counts[s] = 0));
      tickets.forEach(t => { counts[t.status] = (counts[t.status] || 0) + 1; });
      const active = tickets.filter(t => t.status !== 'Abgenommen durch Kunden').length;

      el.innerHTML = `
        <div class="stat-card">
          <div class="stat-value">${tickets.length}</div>
          <div class="stat-label">Gesamt</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${active}</div>
          <div class="stat-label">In Arbeit</div>
        </div>
        ${STATUS_ORDER.filter(s => counts[s] > 0).map(s => `
          <div class="stat-card">
            <div class="stat-value">${counts[s]}</div>
            <div class="stat-label">${statusBadge(s)}</div>
          </div>`).join('')}`;
    }

    function renderFilterBar(tickets) {
      const bar = document.getElementById('filterBar');
      const prevText = document.getElementById('filterText')?.value || '';
      const usedStatuses = STATUS_ORDER.filter(s => tickets.some(t => t.status === s));
      bar.innerHTML = `
        <div class="filter-search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.3" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="filterText" placeholder="Ticket suchen …" oninput="applyFilter()">
        </div>
        <div class="filter-pills">
          <button class="filter-pill${activeStatusFilter === '' ? ' active' : ''}"
                  onclick="setStatusFilter(this, '')">Alle</button>
          ${usedStatuses.map(s => `
            <button class="filter-pill${activeStatusFilter === s ? ' active' : ''}"
                    data-status="${esc(s)}"
                    onclick="setStatusFilter(this, this.dataset.status)">${esc(s)}</button>`
          ).join('')}
        </div>`;
      bar.style.display = 'flex';
      if (prevText) document.getElementById('filterText').value = prevText;
    }

    function setStatusFilter(btn, status) {
      activeStatusFilter = status;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      applyFilter();
    }

    function applyFilter() {
      const text = (document.getElementById('filterText')?.value || '').trim().toLowerCase();
      let filtered = allTickets;
      if (activeStatusFilter) {
        filtered = filtered.filter(t => t.status === activeStatusFilter);
      }
      if (text) {
        filtered = filtered.filter(t =>
          t.title.toLowerCase().includes(text) ||
          (t.owner_name || '').toLowerCase().includes(text)
        );
      }
      renderTickets(document.getElementById('ticketList'), filtered);
    }

    function renderTickets(el, tickets) {
      if (!tickets.length) {
        el.innerHTML = '<div class="empty-state"><p>Keine Tickets gefunden.</p></div>';
        return;
      }
      el.innerHTML = tickets.map(renderTicketCard).join('');
    }

    function renderTicketCard(t) {
      return `
        <div class="ticket-card" id="ticket-${t.id}" data-status="${esc(t.status)}">
          <div class="ticket-header">
            <div class="ticket-title-row">
              <div class="ticket-title">${esc(t.title)}</div>
              <div class="ticket-meta">
                ${statusBadge(t.status)}
                ${t.platform   ? `<span class="meta-tag">${ICON.screen}&nbsp;${esc(t.platform)}</span>` : ''}
                ${t.owner_name ? `<span class="meta-tag">${ICON.user}&nbsp;${esc(t.owner_name)}</span>`  : ''}
              </div>
            </div>
            <div class="ticket-actions">
              <button class="btn btn-secondary btn-sm"
                      data-id="${t.id}"
                      data-title="${esc(t.title)}"
                      data-status="${esc(t.status)}"
                      data-description="${esc(t.description)}"
                      data-platform="${esc(t.platform)}"
                      onclick="openEditModal(this)">
                ${ICON.edit}&nbsp;Bearbeiten
              </button>
              <button class="btn btn-danger btn-sm"
                      data-ticket-id="${t.id}"
                      data-ticket-title="${esc(t.title)}"
                      onclick="deleteTicket(this)">
                ${ICON.trash}&nbsp;Löschen
              </button>
            </div>
          </div>
          ${renderTimeline(t.status)}
          ${t.description ? `<div class="ticket-body">${esc(t.description)}</div>` : ''}
          <div class="comments-section">
            <button class="comments-toggle" onclick="toggleComments(this, ${t.id})">
              ${ICON.chat}&nbsp;Kommentare
              <span class="caret">${ICON.chevron}</span>
            </button>
            <div class="comments-body" id="comments-${t.id}"></div>
          </div>
        </div>`;
    }

    /* ── Kanban board ─────────────────────────────────────────────────────── */
    function renderKanban(tickets) {
      const board = document.getElementById('kanbanBoard');
      board.innerHTML = STATUS_ORDER.map((status, i) => {
        const colTickets = tickets.filter(t => t.status === status);
        return `
          <div class="kanban-column" data-status="${esc(status)}"
               ondragover="event.preventDefault(); this.classList.add('drag-over')"
               ondragleave="this.classList.remove('drag-over')"
               ondrop="handleKanbanDrop(event, '${esc(status)}')">
            <div class="kanban-column-header">
              <span class="kanban-column-count">${colTickets.length}</span>
              <div class="kanban-column-index">${String(i + 1).padStart(2, '0')}</div>
              <div class="kanban-column-title">${esc(status)}</div>
            </div>
            <div class="kanban-cards">
              ${colTickets.length ? colTickets.map(renderKanbanCard).join('') : '<div class="kanban-empty">Keine Tickets</div>'}
            </div>
          </div>`;
      }).join('');
    }

    function renderKanbanCard(t) {
      return `
        <div class="kanban-card" id="ticket-${t.id}" data-status="${esc(t.status)}"
             draggable="true"
             ondragstart="handleKanbanDragStart(event, ${t.id})"
             ondragend="this.classList.remove('dragging')">
          <div class="ticket-title">${esc(t.title)}</div>
          <div class="kanban-card-meta">
            ${t.platform   ? `<span class="meta-tag">${ICON.screen}&nbsp;${esc(t.platform)}</span>` : ''}
            ${t.owner_name ? `<span class="meta-tag">${ICON.user}&nbsp;${esc(t.owner_name)}</span>`  : ''}
          </div>
          ${renderTimeline(t.status)}
          <button type="button" class="kanban-card-quick-btn" onclick="openQuickStatusMenu(event, ${t.id})">Status ändern</button>
        </div>`;
    }

    function handleKanbanDragStart(e, ticketId) {
      e.dataTransfer.setData('text/plain', String(ticketId));
      e.dataTransfer.effectAllowed = 'move';
      e.target.classList.add('dragging');
    }

    function handleKanbanDrop(e, newStatus) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const ticketId = parseInt(e.dataTransfer.getData('text/plain'), 10);
      moveTicketStatus(ticketId, newStatus);
    }

    function openQuickStatusMenu(e, ticketId) {
      e.stopPropagation();
      document.querySelector('.quick-status-menu')?.remove();
      const ticket = allTickets.find(t => t.id === ticketId);
      if (!ticket) return;
      const menu = document.createElement('div');
      menu.className = 'quick-status-menu';
      menu.innerHTML = STATUS_ORDER.map(s => `
        <button type="button" class="quick-status-item${s === ticket.status ? ' is-current' : ''}" data-status="${esc(s)}">${esc(s)}</button>
      `).join('');
      document.body.appendChild(menu);
      const rect = e.currentTarget.getBoundingClientRect();
      menu.style.position = 'absolute';
      menu.style.top  = `${window.scrollY + rect.bottom + 4}px`;
      menu.style.left = `${window.scrollX + Math.min(rect.left, window.innerWidth - 196)}px`;
      menu.addEventListener('click', ev => {
        const btn = ev.target.closest('.quick-status-item');
        if (btn) moveTicketStatus(ticketId, btn.dataset.status);
        menu.remove();
      });
      setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 0);
    }

    function refreshKanbanColumnMeta() {
      STATUS_ORDER.forEach(status => {
        const col = document.querySelector(`.kanban-column[data-status="${CSS.escape(status)}"]`);
        if (!col) return;
        const cardsEl = col.querySelector('.kanban-cards');
        const count   = cardsEl.querySelectorAll('.kanban-card').length;
        col.querySelector('.kanban-column-count').textContent = count;
        const emptyEl = cardsEl.querySelector('.kanban-empty');
        if (count === 0 && !emptyEl) cardsEl.insertAdjacentHTML('beforeend', '<div class="kanban-empty">Keine Tickets</div>');
        if (count > 0 && emptyEl) emptyEl.remove();
      });
    }

    function moveTicketStatus(ticketId, newStatus) {
      const before = allTickets.find(t => t.id === ticketId);
      if (!before || before.status === newStatus) return;
      const updated = Store.updateTicket(ticketId, { status: newStatus });
      allTickets = Store.getTickets(currentUser);
      renderStats(document.getElementById('statsBar'), allTickets);

      if (currentView === 'board') {
        const card = document.getElementById(`ticket-${ticketId}`);
        const targetCards = document.querySelector(`.kanban-column[data-status="${CSS.escape(newStatus)}"] .kanban-cards`);
        if (card && targetCards) {
          patchTicketCard(updated);
          targetCards.querySelector('.kanban-empty')?.remove();
          targetCards.appendChild(card);
          card.classList.add('just-dropped');
          setTimeout(() => card.classList.remove('just-dropped'), 650);
          refreshKanbanColumnMeta();
        } else {
          renderKanban(allTickets);
        }
      } else {
        patchTicketCard(updated);
      }
      showToast('Status aktualisiert');
    }

    function toggleComments(btn, ticketId) {
      const body = document.getElementById(`comments-${ticketId}`);
      const open = body.classList.contains('open');
      if (open) { body.classList.remove('open'); btn.classList.remove('open'); return; }
      btn.classList.add('open');
      body.classList.add('open');
      const ticket = Store.getTicket(ticketId);
      renderAdminComments(body, ticket.comments, ticketId);
    }

    function renderAdminComments(body, comments, ticketId) {
      if (!comments.length) {
        body.innerHTML = '<p class="no-comments">Keine Kommentare vorhanden.</p>';
        return;
      }
      body.innerHTML = comments.map(c => `
        <div class="comment-item" id="c${c.id}">
          <div class="comment-avatar" data-idx="${avatarIdx(c.username)}">${avatar(c.username)}</div>
          <div class="comment-content">
            <div class="comment-header">
              <span class="comment-author">${esc(c.username)}</span>
              <span class="comment-date">${fmtDate(c.created_at)}</span>
              <div class="comment-actions">
                <button class="btn btn-danger btn-sm"
                        data-comment-id="${c.id}"
                        data-ticket-id="${ticketId}"
                        onclick="deleteComment(this)">
                  ${ICON.trash}&nbsp;Löschen
                </button>
              </div>
            </div>
            <div class="comment-text">${esc(c.text)}</div>
          </div>
        </div>`).join('');
    }

    async function deleteTicket(btn) {
      const ticketId = parseInt(btn.dataset.ticketId, 10);
      const title    = btn.dataset.ticketTitle;
      const ok = await showConfirm(
        'Ticket löschen?',
        `„${title}" und alle zugehörigen Kommentare werden unwiderruflich gelöscht.`,
        'Löschen',
        true
      );
      if (!ok) return;
      Store.deleteTicket(ticketId);
      showToast('Ticket gelöscht');
      await loadDashboard();
    }

    async function deleteComment(btn) {
      const commentId = parseInt(btn.dataset.commentId, 10);
      const ticketId  = parseInt(btn.dataset.ticketId, 10);
      const ok = await showConfirm('Kommentar löschen?', '', 'Löschen', true);
      if (!ok) return;
      Store.deleteComment(ticketId, commentId);
      document.getElementById(`c${commentId}`)?.remove();
      const body = document.getElementById(`comments-${ticketId}`);
      if (body && !body.querySelector('.comment-item')) {
        body.innerHTML = '<p class="no-comments">Keine Kommentare vorhanden.</p>';
      }
      showToast('Kommentar gelöscht');
    }

    /* ── Create Ticket ────────────────────────────────────────────────────── */
    function openCreateModal() {
      document.getElementById('cUser').innerHTML =
        clientUsers.map(u => `<option value="${u.id}">${esc(u.display_name)}</option>`).join('');
      document.getElementById('cTitle').value    = '';
      document.getElementById('cStatus').value   = 'Konzept';
      document.getElementById('cPlatform').value = '';
      document.getElementById('cDesc').value     = '';
      const errEl = document.getElementById('createError');
      errEl.style.display = 'none';
      errEl.textContent   = '';
      document.getElementById('createTicketModal').classList.add('open');
      setTimeout(() => document.getElementById('cTitle').focus(), 80);
    }

    function closeCreateModal() {
      document.getElementById('createTicketModal').classList.remove('open');
    }

    async function submitCreate() {
      const title       = document.getElementById('cTitle').value.trim();
      const userId      = parseInt(document.getElementById('cUser').value, 10);
      const status      = document.getElementById('cStatus').value;
      const platform    = document.getElementById('cPlatform').value.trim();
      const description = document.getElementById('cDesc').value.trim();
      const errEl       = document.getElementById('createError');

      if (!title) {
        errEl.textContent   = 'Bitte einen Titel eingeben.';
        errEl.style.display = 'flex';
        const input = document.getElementById('cTitle');
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 400);
        return;
      }

      errEl.style.display = 'none';
      Store.createTicket({ title, user_id: userId, status, platform, description });
      closeCreateModal();
      showToast('Ticket erstellt');
      await loadDashboard();
    }

    /* ── Edit Ticket ──────────────────────────────────────────────────────── */
    function openEditModal(btn) {
      editingTicketId = parseInt(btn.dataset.id, 10);
      document.getElementById('eTitle').value    = btn.dataset.title       || '';
      document.getElementById('eStatus').value   = btn.dataset.status      || 'Konzept';
      document.getElementById('ePlatform').value = btn.dataset.platform    || '';
      document.getElementById('eDesc').value     = btn.dataset.description || '';
      document.getElementById('editTicketModal').classList.add('open');
      setTimeout(() => document.getElementById('eTitle').focus(), 80);
    }

    function closeEditModal() {
      document.getElementById('editTicketModal').classList.remove('open');
      editingTicketId = null;
    }

    async function submitEdit() {
      const title       = document.getElementById('eTitle').value.trim();
      const status      = document.getElementById('eStatus').value;
      const platform    = document.getElementById('ePlatform').value.trim();
      const description = document.getElementById('eDesc').value.trim();

      if (!title) {
        const input = document.getElementById('eTitle');
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 400);
        return;
      }

      const before       = allTickets.find(t => t.id === editingTicketId);
      const statusChanged = before && before.status !== status;
      const updated       = Store.updateTicket(editingTicketId, { title, status, platform, description });
      closeEditModal();
      showToast('Ticket aktualisiert');

      allTickets = Store.getTickets(currentUser);
      renderStats(document.getElementById('statsBar'), allTickets);
      renderFilterBar(allTickets);

      const staysVisible = !activeStatusFilter || activeStatusFilter === status;
      if (statusChanged && staysVisible && document.getElementById(`ticket-${updated.id}`)) {
        patchTicketCard(updated);
      } else {
        applyFilter();
      }
    }
  </script>
</body>
</html>
